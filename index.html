<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Clash</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: white;
      }
      h1 {
        margin-bottom: 20px;
      }

      canvas {
        border: 2px solid #444;
        background-color: #000;
      }

      #gameCanvas {
        cursor: crosshair;
      }

      button {
        padding: 10px 20px;
        margin: 0 5px;
        font-size: 16px;
        cursor: pointer;
      }

      .pattern-btn {
        padding: 6px 12px;
        font-size: 12px;
        min-width: 80px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div
      style="
        display: flex;
        gap: 20px;
        align-items: flex-start;
        justify-content: center;
      "
    >
      <!-- Spieler 1 (links) -->
      <div
        id="player1Side"
        style="
          display: flex;
          flex-direction: column;
          gap: 15px;
          align-items: center;
        "
      >
        <button
          id="player1Btn"
          style="
            background-color: #44dddd;
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            font-size: 16px;
          "
        >
          Spieler 1
        </button>

        <!-- Points display -->
        <div style="font-size: 24px; font-weight: bold; color: #44dddd">
          Points: <span id="points1">80</span>
        </div>

        <canvas
          id="previewCanvas1"
          width="100"
          height="100"
          style="border: 2px solid #666"
        ></canvas>

        <!-- Preview animation toggle -->
        <button
          id="previewToggle1"
          style="
            padding: 5px 10px;
            font-size: 16px;
            background-color: #333;
            color: white;
            border: 1px solid #666;
            cursor: pointer;
            margin-top: 5px;
          "
        >
          ▶
        </button>

        <!-- Pattern info -->
        <div style="text-align: center; margin-top: 5px">
          <div
            id="patternName1"
            style="font-size: 14px; color: #ffffff; font-weight: bold"
          >
            -
          </div>
          <div id="patternCost1" style="font-size: 12px; color: #aaaaaa">
            Cost: -
          </div>
        </div>

        <div style="display: flex; gap: 10px">
          <!-- Defense column -->
          <div style="display: flex; flex-direction: column; gap: 5px; flex: 1">
            <div
              style="
                font-size: 12px;
                font-weight: bold;
                text-align: center;
                color: #aaaaaa;
              "
            >
              Defense
            </div>
            <button class="pattern-btn player1-pattern" data-pattern="2">
              Block
            </button>
            <button class="pattern-btn player1-pattern" data-pattern="3">
              Beehive
            </button>
            <button class="pattern-btn player1-pattern" data-pattern="4">
              Boat
            </button>
            <button class="pattern-btn player1-pattern" data-pattern="5">
              Blinker
            </button>
            <button class="pattern-btn player1-pattern" data-pattern="6">
              Toad
            </button>
            <button class="pattern-btn player1-pattern" data-pattern="7">
              Beacon
            </button>
          </div>
          <!-- Attack column -->
          <div style="display: flex; flex-direction: column; gap: 5px; flex: 1">
            <div
              style="
                font-size: 12px;
                font-weight: bold;
                text-align: center;
                color: #aaaaaa;
              "
            >
              Attack
            </div>
            <button class="pattern-btn player1-pattern" data-pattern="0">
              LWSS
            </button>
            <button class="pattern-btn player1-pattern" data-pattern="1">
              MWSS
            </button>
            <button class="pattern-btn player1-pattern" data-pattern="8">
              Glider down
            </button>
            <button class="pattern-btn player1-pattern" data-pattern="9">
              Glider up
            </button>
            <button class="pattern-btn player1-pattern" data-pattern="10">
              HWSS
            </button>
            <button class="pattern-btn player1-pattern" data-pattern="11">
              Glider Gun up
            </button>
            <button class="pattern-btn player1-pattern" data-pattern="12">
              Glider Gun down
            </button>
          </div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px">
          <button
            id="ready1Btn"
            style="
              padding: 10px 20px;
              font-size: 14px;
              background-color: #44dddd;
              color: white;
            "
          >
            Done
          </button>
          <button
            id="surrender1Btn"
            style="
              padding: 10px 20px;
              font-size: 14px;
              background-color: #aa3333;
              color: white;
            "
          >
            Surrender
          </button>
        </div>
      </div>

      <!-- Main game canvas -->
      <div>
        <!-- Generation counter and Turn timer (above game canvas) -->
        <div style="text-align: center; margin-bottom: 10px; width: 700px">
          <div style="font-size: 14px; color: #aaaaaa; margin-bottom: 5px">
            Generation: <span id="generationCounter">0</span> /
            <span id="maxGenerations"></span>
          </div>

          <!-- Turn timer bar (only visible in live phase) -->
          <div id="turnTimerContainer" style="visibility: hidden">
            <div
              style="
                width: 700px;
                height: 8px;
                background-color: #333;
                border-radius: 4px;
                overflow: hidden;
                border: 1px solid #666;
              "
            >
              <div
                id="turnTimerBar"
                style="
                  height: 100%;
                  width: 100%;
                  background-color: #44dddd;
                  transition: width 0.1s linear;
                "
              ></div>
            </div>
          </div>
        </div>
        <canvas id="gameCanvas" width="700" height="700"></canvas>
      </div>

      <!-- Spieler 2 (rechts) -->
      <div
        id="player2Side"
        style="
          display: flex;
          flex-direction: column;
          gap: 15px;
          align-items: center;
        "
      >
        <button
          id="player2Btn"
          style="
            background-color: #dd44dd;
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            font-size: 16px;
          "
        >
          Spieler 2
        </button>

        <!-- Points display -->
        <div style="font-size: 24px; font-weight: bold; color: #dd44dd">
          Points: <span id="points2">80</span>
        </div>

        <canvas
          id="previewCanvas2"
          width="100"
          height="100"
          style="border: 2px solid #666"
        ></canvas>

        <!-- Preview animation toggle -->
        <button
          id="previewToggle2"
          style="
            padding: 5px 10px;
            font-size: 16px;
            background-color: #333;
            color: white;
            border: 1px solid #666;
            cursor: pointer;
            margin-top: 5px;
          "
        >
          ▶
        </button>

        <!-- Pattern info -->
        <div style="text-align: center; margin-top: 5px">
          <div
            id="patternName2"
            style="font-size: 14px; color: #ffffff; font-weight: bold"
          >
            -
          </div>
          <div id="patternCost2" style="font-size: 12px; color: #aaaaaa">
            Cost: -
          </div>
        </div>

        <div style="display: flex; gap: 10px">
          <!-- Attack column (first for Player 2) -->
          <div style="display: flex; flex-direction: column; gap: 5px; flex: 1">
            <div
              style="
                font-size: 12px;
                font-weight: bold;
                text-align: center;
                color: #aaaaaa;
              "
            >
              Attack
            </div>
            <button class="pattern-btn player2-pattern" data-pattern="0">
              LWSS
            </button>
            <button class="pattern-btn player2-pattern" data-pattern="1">
              MWSS
            </button>
            <button class="pattern-btn player2-pattern" data-pattern="8">
              Glider down
            </button>
            <button class="pattern-btn player2-pattern" data-pattern="9">
              Glider up
            </button>
            <button class="pattern-btn player2-pattern" data-pattern="10">
              HWSS
            </button>
            <button class="pattern-btn player2-pattern" data-pattern="11">
              Glider Gun up
            </button>
            <button class="pattern-btn player2-pattern" data-pattern="12">
              Glider Gun down
            </button>
          </div>
          <!-- Defense column (second for Player 2) -->
          <div style="display: flex; flex-direction: column; gap: 5px; flex: 1">
            <div
              style="
                font-size: 12px;
                font-weight: bold;
                text-align: center;
                color: #aaaaaa;
              "
            >
              Defense
            </div>
            <button class="pattern-btn player2-pattern" data-pattern="2">
              Block
            </button>
            <button class="pattern-btn player2-pattern" data-pattern="3">
              Beehive
            </button>
            <button class="pattern-btn player2-pattern" data-pattern="4">
              Boat
            </button>
            <button class="pattern-btn player2-pattern" data-pattern="5">
              Blinker
            </button>
            <button class="pattern-btn player2-pattern" data-pattern="6">
              Toad
            </button>
            <button class="pattern-btn player2-pattern" data-pattern="7">
              Beacon
            </button>
          </div>
        </div>
        <!-- Ready button -->
        <div style="display: flex; gap: 10px; margin-top: 10px">
          <button
            id="surrender2Btn"
            style="
              padding: 10px 20px;
              font-size: 14px;
              background-color: #aa3333;
              color: white;
            "
          >
            Surrender
          </button>
          <button
            id="ready2Btn"
            style="
              padding: 10px 20px;
              font-size: 14px;
              background-color: #dd44dd;
              color: white;
            "
          >
            Done
          </button>
        </div>
      </div>
    </div>

    <!-- Start / Lobby overlay -->
    <div
      id="startOverlay"
      style="
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background-color: #2a2a2a;
          padding: 40px 60px;
          border-radius: 10px;
          text-align: center;
          min-width: 350px;
        "
      >
        <h1 style="font-size: 48px; margin-bottom: 10px; color: #00ff00">
          Pattern Clash
        </h1>
        <p style="font-size: 18px; color: #aaaaaa; margin-bottom: 30px">
          Competitive Game of Life
        </p>

        <!-- Mode selection (initial view) -->
        <div id="lobbyModeSelect">
          <button
            id="localGameBtn"
            style="
              padding: 15px 40px;
              font-size: 20px;
              background-color: #00ff00;
              color: #1a1a1a;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              font-weight: bold;
              margin: 5px;
              width: 250px;
            "
          >
            Local Game
          </button>
          <br />
          <button
            id="onlineGameBtn"
            style="
              padding: 15px 40px;
              font-size: 20px;
              background-color: #44dddd;
              color: #1a1a1a;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              font-weight: bold;
              margin: 5px;
              width: 250px;
            "
          >
            Online Game
          </button>
        </div>

        <!-- Online: Create or Join -->
        <div id="lobbyOnlineChoice" style="display: none">
          <button
            id="createGameBtn"
            style="
              padding: 12px 30px;
              font-size: 18px;
              background-color: #44dddd;
              color: #1a1a1a;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              font-weight: bold;
              margin: 5px;
              width: 250px;
            "
          >
            Create Game
          </button>
          <br />
          <button
            id="joinGameBtn"
            style="
              padding: 12px 30px;
              font-size: 18px;
              background-color: #dd44dd;
              color: #1a1a1a;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              font-weight: bold;
              margin: 5px;
              width: 250px;
            "
          >
            Join Game
          </button>
          <br />
          <button
            id="lobbyBackBtn1"
            style="
              padding: 8px 20px;
              font-size: 14px;
              background-color: #666;
              color: white;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              margin-top: 15px;
            "
          >
            ← Back
          </button>
        </div>

        <!-- Waiting for opponent after creating -->
        <div id="lobbyWaiting" style="display: none">
          <p style="font-size: 16px; color: #aaaaaa; margin-bottom: 10px">
            Share this code with your opponent:
          </p>
          <div
            id="gameCodeDisplay"
            style="
              font-size: 42px;
              font-weight: bold;
              color: #44dddd;
              letter-spacing: 8px;
              margin: 15px 0;
              font-family: monospace;
            "
          >
            ------
          </div>
          <p
            id="lobbyStatus"
            style="font-size: 14px; color: #888; margin-bottom: 15px"
          >
            Waiting for opponent...
          </p>
          <button
            id="lobbyBackBtn2"
            style="
              padding: 8px 20px;
              font-size: 14px;
              background-color: #666;
              color: white;
              border: none;
              border-radius: 5px;
              cursor: pointer;
            "
          >
            ← Cancel
          </button>
        </div>

        <!-- Join game input -->
        <div id="lobbyJoin" style="display: none">
          <p style="font-size: 16px; color: #aaaaaa; margin-bottom: 10px">
            Enter game code:
          </p>
          <input
            id="joinCodeInput"
            type="text"
            maxlength="6"
            placeholder="ABC123"
            style="
              font-size: 32px;
              font-weight: bold;
              text-align: center;
              letter-spacing: 6px;
              width: 220px;
              padding: 10px;
              border: 2px solid #666;
              border-radius: 5px;
              background-color: #1a1a1a;
              color: #dd44dd;
              font-family: monospace;
              text-transform: uppercase;
            "
          />
          <br />
          <p
            id="joinError"
            style="
              font-size: 14px;
              color: #ff4444;
              margin: 10px 0;
              display: none;
            "
          >
            Error
          </p>
          <button
            id="joinConfirmBtn"
            style="
              padding: 12px 30px;
              font-size: 18px;
              background-color: #dd44dd;
              color: #1a1a1a;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              font-weight: bold;
              margin: 5px;
            "
          >
            Join
          </button>
          <br />
          <button
            id="lobbyBackBtn3"
            style="
              padding: 8px 20px;
              font-size: 14px;
              background-color: #666;
              color: white;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              margin-top: 15px;
            "
          >
            ← Back
          </button>
        </div>
      </div>
    </div>

    <!-- Winner overlay -->
    <div
      id="winnerOverlay"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background-color: #2a2a2a;
          padding: 40px 60px;
          border-radius: 10px;
          text-align: center;
        "
      >
        <h1
          id="winnerTitle"
          style="font-size: 48px; margin-bottom: 20px; color: #00ff00"
        >
          Player 1 Wins!
        </h1>
        <p
          id="winnerScore"
          style="font-size: 24px; color: #aaaaaa; margin-bottom: 30px"
        >
          Score: 25 - 18
        </p>
        <button
          id="showBoardBtn"
          style="
            padding: 15px 40px;
            font-size: 20px;
            background-color: #666;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 15px;
          "
        >
          Show Board
        </button>
        <button
          id="restartBtn"
          style="
            padding: 15px 40px;
            font-size: 20px;
            background-color: #44dddd;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          "
        >
          Restart Game
        </button>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"
        }
      }
    </script>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
