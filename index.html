<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Clash</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: white;
      }

      canvas {
        border: 2px solid #444;
        background-color: #000;
      }

      #gameCanvas {
        cursor: crosshair;
      }

      button {
        padding: 10px 20px;
        margin: 0 5px;
        font-size: 16px;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
      }

      .stat-label {
        font-size: 12px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .stat-value {
        font-size: 22px;
        font-weight: bold;
      }

      .card-hand {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-height: 96px;
        padding: 6px;
        background: #141414;
        border: 1px solid #333;
        border-radius: 6px;
        width: 100%;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div
      style="
        display: flex;
        gap: 20px;
        align-items: flex-start;
        justify-content: center;
      "
    >
      <!-- Player 1 side -->
      <div
        id="player1Side"
        style="
          display: flex;
          flex-direction: column;
          gap: 15px;
          align-items: center;
          width: 360px;
        "
      >
        <button
          id="player1Btn"
          style="
            background-color: #44dddd;
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
          "
        >
          Player 1
        </button>
        <span
          id="surrender1Btn"
          style="
            font-size: 12px;
            color: #666;
            cursor: pointer;
            text-decoration: underline;
            margin-top: -10px;
          "
        >
          Quit
        </span>

        <div style="display: flex; gap: 30px">
          <div style="text-align: center">
            <div class="stat-label">Score</div>
            <div class="stat-value" style="color: #44dddd">
              <span id="score1">0</span>
            </div>
          </div>
          <div style="text-align: center">
            <div class="stat-label">Budget</div>
            <div class="stat-value" style="color: #ffffff">
              <span id="budget1">50</span>
            </div>
          </div>
        </div>

        <div id="cardHand1" class="card-hand"></div>
      </div>

      <!-- Main game canvas + status bar -->
      <div>
        <div style="text-align: center; margin-bottom: 10px; width: 700px">
          <div style="font-size: 14px; color: #aaaaaa">
            Phase <span id="phaseCounter">1</span> /
            <span id="totalPhases">5</span>
            &nbsp;·&nbsp; Generation:
            <span id="generationCounter">0</span> /
            <span id="maxGenerations">150</span>
          </div>
        </div>
        <canvas id="gameCanvas" width="700" height="700"></canvas>
      </div>

      <!-- Player 2 side -->
      <div
        id="player2Side"
        style="
          display: flex;
          flex-direction: column;
          gap: 15px;
          align-items: center;
          width: 360px;
        "
      >
        <button
          id="player2Btn"
          style="
            background-color: #dd44dd;
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
          "
        >
          Player 2
        </button>
        <span
          id="surrender2Btn"
          style="
            font-size: 12px;
            color: #666;
            cursor: pointer;
            text-decoration: underline;
            margin-top: -10px;
          "
        >
          Quit
        </span>

        <div style="display: flex; gap: 30px">
          <div style="text-align: center">
            <div class="stat-label">Score</div>
            <div class="stat-value" style="color: #dd44dd">
              <span id="score2">0</span>
            </div>
          </div>
          <div style="text-align: center">
            <div class="stat-label">Budget</div>
            <div class="stat-value" style="color: #ffffff">
              <span id="budget2">50</span>
            </div>
          </div>
        </div>

        <div id="cardHand2" class="card-hand"></div>
      </div>
    </div>

    <!-- Buy overlay -->
    <div
      id="buyOverlay"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 900;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background-color: #2a2a2a;
          padding: 25px 30px;
          border-radius: 10px;
          max-width: 520px;
          width: 90%;
          max-height: 85vh;
          display: flex;
          flex-direction: column;
          gap: 15px;
        "
      >
        <h2
          id="buyOverlayTitle"
          style="margin: 0; font-size: 24px; text-align: center"
        >
          Buy Phase
        </h2>

        <div
          style="
            display: flex;
            justify-content: space-around;
            gap: 20px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 6px;
          "
        >
          <div style="text-align: center">
            <div class="stat-label">Budget</div>
            <div style="font-size: 20px; font-weight: bold">
              <span id="buyOverlayBudget">50</span>
            </div>
          </div>
          <div style="text-align: center">
            <div class="stat-label">Slots</div>
            <div style="font-size: 20px; font-weight: bold">
              <span id="buyOverlaySlots">0</span> /
              <span id="buyOverlaySlotsMax" style="color: #888">10</span>
            </div>
          </div>
        </div>

        <div
          id="buyOverlayPatternList"
          style="
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            max-height: 55vh;
            padding-right: 4px;
          "
        ></div>

        <button
          id="buyOverlayConfirmBtn"
          style="
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #00ff00;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          "
        >
          Confirm Buy
        </button>
      </div>
    </div>

    <!-- Hotseat switch overlay -->
    <div
      id="switchOverlay"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.95);
        z-index: 950;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background-color: #2a2a2a;
          padding: 40px 60px;
          border-radius: 10px;
          text-align: center;
        "
      >
        <h2 id="switchOverlayTitle" style="margin: 0 0 20px 0; font-size: 28px">
          Pass the device
        </h2>
        <p style="color: #aaa; margin: 0 0 25px 0">
          Only the next player should see the screen.
        </p>
        <button
          id="switchOverlayReadyBtn"
          style="
            padding: 12px 32px;
            font-size: 18px;
            font-weight: bold;
            background-color: #00ff00;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          "
        >
          I'm ready
        </button>
      </div>
    </div>

    <!-- Start / Lobby overlay -->
    <div
      id="startOverlay"
      style="
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background-color: #2a2a2a;
          padding: 40px 60px;
          border-radius: 10px;
          text-align: center;
          min-width: 350px;
        "
      >
        <h1 style="font-size: 48px; margin-bottom: 10px; color: #00ff00">
          Pattern Clash
        </h1>
        <p style="font-size: 18px; color: #aaaaaa; margin-bottom: 30px">
          Competitive Game of Life
        </p>

        <div id="lobbyModeSelect">
          <button
            id="localGameBtn"
            style="
              padding: 15px 40px;
              font-size: 20px;
              background-color: #00ff00;
              color: #1a1a1a;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              font-weight: bold;
              margin: 5px;
              width: 250px;
            "
          >
            Local Game
          </button>
          <br />
          <button
            id="onlineGameBtn"
            style="
              padding: 15px 40px;
              font-size: 20px;
              background-color: #44dddd;
              color: #1a1a1a;
              border: none;
              border-radius: 5px;
              cursor: not-allowed;
              font-weight: bold;
              margin: 5px;
              width: 250px;
              opacity: 0.4;
            "
            disabled
          >
            Online Game (disabled)
          </button>
        </div>

        <!-- Kept in DOM so domRefs resolves; hidden while online is off -->
        <div id="lobbyOnlineChoice" style="display: none">
          <button id="createGameBtn">Create Game</button>
          <button id="joinGameBtn">Join Game</button>
          <button id="lobbyBackBtn1">← Back</button>
        </div>
        <div id="lobbyWaiting" style="display: none">
          <div id="gameCodeDisplay">------</div>
          <p id="lobbyStatus">Waiting for opponent...</p>
          <button id="lobbyBackBtn2">← Cancel</button>
        </div>
        <div id="lobbyJoin" style="display: none">
          <input id="joinCodeInput" type="text" maxlength="6" />
          <p id="joinError">Error</p>
          <button id="joinConfirmBtn">Join</button>
          <button id="lobbyBackBtn3">← Back</button>
        </div>
      </div>
    </div>

    <!-- Winner overlay -->
    <div
      id="winnerOverlay"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background-color: #2a2a2a;
          padding: 40px 60px;
          border-radius: 10px;
          text-align: center;
        "
      >
        <h1
          id="winnerTitle"
          style="font-size: 48px; margin-bottom: 20px; color: #00ff00"
        >
          Player 1 Wins!
        </h1>
        <p
          id="winnerScore"
          style="font-size: 24px; color: #aaaaaa; margin-bottom: 30px"
        >
          Score: 0 — 0
        </p>
        <button
          id="showBoardBtn"
          style="
            padding: 15px 40px;
            font-size: 20px;
            background-color: #666;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 15px;
          "
        >
          Show Board
        </button>
        <button
          id="restartBtn"
          style="
            padding: 15px 40px;
            font-size: 20px;
            background-color: #44dddd;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          "
        >
          Restart Game
        </button>
      </div>
    </div>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
