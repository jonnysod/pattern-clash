<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Clash</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: white;
      }
      h1 {
        margin-bottom: 20px;
      }

      canvas {
        border: 2px solid #444;
        background-color: #000;
      }

      #gameCanvas {
        cursor: crosshair;
      }

      button {
        padding: 10px 20px;
        margin: 0 5px;
        font-size: 16px;
        cursor: pointer;
      }

      .pattern-btn {
        padding: 6px 12px;
        font-size: 12px;
        min-width: 80px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <h1>Pattern Clash</h1>

    <div
      style="
        display: flex;
        gap: 20px;
        align-items: flex-start;
        justify-content: center;
      "
    >
      <!-- Spieler 1 (links) -->
      <div
        style="
          display: flex;
          flex-direction: column;
          gap: 15px;
          align-items: center;
        "
      >
        <button
          id="player1Btn"
          style="
            background-color: #44dddd;
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            font-size: 16px;
          "
        >
          Spieler 1
        </button>

        <!-- Score display -->
        <div style="font-size: 24px; font-weight: bold; color: #44dddd">
          Score: <span id="score1">0</span>
        </div>

        <!-- Budget display -->
        <div style="font-size: 18px; color: #aaaaaa">
          Budget: <span id="budget1"></span>
        </div>

        <canvas
          id="previewCanvas1"
          width="100"
          height="100"
          style="border: 2px solid #666"
        ></canvas>

        <div style="display: flex; gap: 5px">
          <button id="rotateLeft1" style="padding: 6px 12px; font-size: 18px">
            ⟲
          </button>
          <button id="rotateRight1" style="padding: 6px 12px; font-size: 18px">
            ⟳
          </button>
        </div>

        <div style="display: flex; flex-direction: column; gap: 5px">
          <button class="pattern-btn player1-pattern" data-pattern="0">
            Glider
          </button>
          <button class="pattern-btn player1-pattern" data-pattern="1">
            LWSS
          </button>
          <button class="pattern-btn player1-pattern" data-pattern="2">
            MWSS
          </button>
          <button class="pattern-btn player1-pattern" data-pattern="3">
            Block
          </button>
          <button class="pattern-btn player1-pattern" data-pattern="4">
            Beehive
          </button>
          <button class="pattern-btn player1-pattern" data-pattern="5">
            Boat
          </button>
          <button class="pattern-btn player1-pattern" data-pattern="6">
            Blinker
          </button>
          <button class="pattern-btn player1-pattern" data-pattern="7">
            Toad
          </button>
          <button class="pattern-btn player1-pattern" data-pattern="8">
            Beacon
          </button>
        </div>
        <!-- Ready button -->
        <button
          id="ready1Btn"
          style="
            padding: 10px 20px;
            font-size: 14px;
            background-color: #44dddd;
            color: white;
            margin-top: 10px;
          "
        >
          Ready!
        </button>
      </div>

      <!-- Main game canvas -->
      <div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <!-- Generation counter -->
        <div
          style="
            text-align: center;
            margin-top: 10px;
            font-size: 18px;
            color: #aaaaaa;
          "
        >
          Generation: <span id="generationCounter">0</span> /
          <span id="maxGenerations"></span>
        </div>

        <div id="controls" style="margin-top: 10px; text-align: center">
          <button id="startBtn">Start</button>
          <button id="pauseBtn">Pause</button>
          <button id="resetBtn">Reset</button>
        </div>
      </div>

      <!-- Spieler 2 (rechts) -->
      <div
        style="
          display: flex;
          flex-direction: column;
          gap: 15px;
          align-items: center;
        "
      >
        <button
          id="player2Btn"
          style="
            background-color: #dd44dd;
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            font-size: 16px;
          "
        >
          Spieler 2
        </button>

        <!-- Score display -->
        <div style="font-size: 24px; font-weight: bold; color: #dd44dd">
          Score: <span id="score2">0</span>
        </div>

        <!-- Budget display -->
        <div style="font-size: 18px; color: #aaaaaa">
          Budget: <span id="budget2"></span>
        </div>

        <canvas
          id="previewCanvas2"
          width="100"
          height="100"
          style="border: 2px solid #666"
        ></canvas>

        <div style="display: flex; gap: 5px">
          <button id="rotateLeft2" style="padding: 6px 12px; font-size: 18px">
            ⟲
          </button>
          <button id="rotateRight2" style="padding: 6px 12px; font-size: 18px">
            ⟳
          </button>
        </div>

        <div style="display: flex; flex-direction: column; gap: 5px">
          <button class="pattern-btn player2-pattern" data-pattern="0">
            Glider
          </button>
          <button class="pattern-btn player2-pattern" data-pattern="1">
            LWSS
          </button>
          <button class="pattern-btn player2-pattern" data-pattern="2">
            MWSS
          </button>
          <button class="pattern-btn player2-pattern" data-pattern="3">
            Block
          </button>
          <button class="pattern-btn player2-pattern" data-pattern="4">
            Beehive
          </button>
          <button class="pattern-btn player2-pattern" data-pattern="5">
            Boat
          </button>
          <button class="pattern-btn player2-pattern" data-pattern="6">
            Blinker
          </button>
          <button class="pattern-btn player2-pattern" data-pattern="7">
            Toad
          </button>
          <button class="pattern-btn player2-pattern" data-pattern="8">
            Beacon
          </button>
        </div>
        <!-- Ready button -->
        <button
          id="ready2Btn"
          style="
            padding: 10px 20px;
            font-size: 14px;
            background-color: #dd44dd;
            color: white;
            margin-top: 10px;
          "
        >
          Ready!
        </button>
      </div>
    </div>

    </div>

    <!-- Winner overlay -->
    <div id="winnerOverlay" style="
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    ">
      <div style="
        background-color: #2a2a2a;
        padding: 40px 60px;
        border-radius: 10px;
        text-align: center;
      ">
        <h1 id="winnerTitle" style="font-size: 48px; margin-bottom: 20px; color: #00ff00">Player 1 Wins!</h1>
        <p id="winnerScore" style="font-size: 24px; color: #aaaaaa; margin-bottom: 30px">Score: 25 - 18</p>
        <button id="restartBtn" style="
          padding: 15px 40px;
          font-size: 20px;
          background-color: #44dddd;
          color: white;
          border: none;
          border-radius: 5px;
          cursor: pointer;
        ">Restart Game</button>
      </div>
    </div>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
